#########################################################
# Node-specific configuration
#########################################################
beneficiary = "0x0000000000000000000000000000000000000000"
node_name = "monad-sonar-crawler"                                  # Node Name
network_name = "testnet"                                   # DO NOT CHANGE
ipc_tx_batch_size = 1000
ipc_max_queued_batches = 10
# must be <= ipc_max_queued_batches
ipc_queued_batches_watermark = 3

statesync_threshold = 600
statesync_max_concurrent_requests = 5

#########################################################
# Network-wide configuration
#########################################################
chain_id = 10143

[peer_discovery]
self_address = "203.0.113.1:8300"    # advertised endpoint: set to your host's public IP (RFC5737 example here)
self_auth_port = 8301
self_record_seq_num = 2
self_name_record_sig = "acae31d29ddcd52e98bbfb8f8bd6ec6c4f4474092366d3c78009963b60245a911c8b46cd96ea26f5838506f9d0d9f40c49ff46fdf6e0c9853b8fd8e3d045a0c601" # Name Record Signature
refresh_period = 4
request_timeout = 5
unresponsive_prune_threshold = 3
last_participation_prune_threshold = 1000
min_num_peers = 90
max_num_peers = 450
ping_rate_limit_per_second = 100

[fullnode_raptorcast]
enable_publisher = true
enable_client = true
raptor10_fullnode_redundancy_factor = 3.0
max_group_size = 150
round_span = 240
invite_lookahead = 20
max_invite_wait = 10
deadline_round_dist = 10
init_empty_round_span = 23
max_num_group = 3
invite_future_dist_min = 1
invite_future_dist_max = 600
invite_accept_heartbeat_ms = 10000

[network]
bind_address_host = "0.0.0.0"
bind_address_port = 8300
authenticated_bind_address_port = 8301
max_rtt_ms = 300
max_mbps = 1000

#########################################################
# Peers configuration
#########################################################

[fullnode_dedicated]
identities = []

[fullnode_raptorcast.full_nodes_prioritized]
identities = []

[blocksync_override]
peers = []

[statesync]
expand_to_group = true

